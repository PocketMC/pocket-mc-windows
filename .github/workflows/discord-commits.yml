name: Discord Commit Feed

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Commit Info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_GITHUB_WEBHOOK }}
          COMMITS: ${{ toJson(github.event.commits) }}
          REPO_NAME: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.actor }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_GITHUB_WEBHOOK is not set. Skipping."
            exit 0
          fi
          
          python3 -c '
          import os, json, urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK")
          commits_json = os.environ.get("COMMITS", "[]")
          
          try:
              commits = json.loads(commits_json)
          except json.JSONDecodeError:
              commits = []

          repo_name = os.environ.get("REPO_NAME")
          branch = os.environ.get("BRANCH")
          pusher = os.environ.get("PUSHER")
          compare_url = os.environ.get("COMPARE_URL")

          if not commits:
              print("No commits to process.")
              exit(0)

          embeds = []
          for c in commits:
              # Get the full commit message
              message = c.get("message", "")
              if len(message) > 4000:
                  message = message[:4000] + "..."
              
              # Split title and description
              parts = message.split("\n", 1)
              title = parts[0][:256]
              desc = parts[1].strip() if len(parts) > 1 else ""
              
              author = c.get("author", {}).get("name", pusher)
              url = c.get("url", compare_url)
              commit_id = c.get("id", "")[:7]
              
              embed = {
                  "title": f"[{repo_name}:{branch}] {title}",
                  "url": url,
                  "description": desc,
                  "color": 2326507, # GitHub Dark Blue
                  "author": {
                      "name": author
                  },
                  "footer": {
                      "text": f"Commit: {commit_id}"
                  }
              }
              embeds.append(embed)

          # Discord accepts max 10 embeds per message
          for i in range(0, len(embeds), 10):
              chunk = embeds[i:i+10]
              payload = {
                  "content": f"**{len(commits)} new commit(s)** pushed by `{pusher}`",
                  "embeds": chunk
              }
              req = urllib.request.Request(webhook_url, method="POST")
              req.add_header("Content-Type", "application/json")
              req.add_header("User-Agent", "GitHubActions-DiscordWebhooks")
              data = json.dumps(payload).encode("utf-8")
              try:
                  with urllib.request.urlopen(req, data=data) as response:
                      print(f"Sent {len(chunk)} embeds. Response: {response.status}")
              except Exception as e:
                  print("Error sending webhook:", e)
          '
