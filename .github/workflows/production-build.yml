name: .NET Core Desktop

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-

    - name: Restore dependencies
      run: dotnet restore PocketMC.Desktop.sln

    - name: Build Configuration Debug
      run: dotnet build PocketMC.Desktop.sln --configuration Debug --no-restore

    - name: Build Configuration Release
      run: dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --configuration Release --no-build

    - name: Install Velopack CLI
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet tool install -g vpk

    - name: Add dotnet tools to PATH
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Publish WPF app
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj -c Release -r win-x64 -o ./publish

    - name: Pack Velopack release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $releaseVersion = "${{ github.ref_name }}".TrimStart('v')
        if ([string]::IsNullOrWhiteSpace($releaseVersion)) { Write-Error "Unable to determine release version from tag."; exit 1 }
        vpk pack -u PocketMC -v $releaseVersion -p ./publish -e PocketMC.Desktop.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: PocketMC ${{ github.ref_name }}
        body: Release built by CI for ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload all Releases/ files to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
      run: |
        if (-not $env:UPLOAD_URL) { Write-Error "No upload_url from create_release"; exit 1 }
        $uploadUrl = $env:UPLOAD_URL -replace '\{\?.*',''
        Write-Host "Uploading assets to $uploadUrl"
        $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = 'application/vnd.github+json' }
        $files = Get-ChildItem -Path Releases -File -Recurse | Where-Object { $_.Length -gt 0 }
        if (-not $files) { Write-Host "No files found in Releases/ to upload."; exit 0 }
        foreach ($file in $files) {
          $name = [System.Uri]::EscapeDataString($file.Name)
          $uri = "$uploadUrl?name=$name"
          Write-Host "Uploading $($file.FullName) as $name..."
          try {
            $resp = Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -InFile $file.FullName -ContentType 'application/octet-stream'
            Write-Host "Uploaded $($file.Name) (id: $($resp.id))"
          } catch {
            Write-Error "Failed to upload $($file.Name): $_"
            exit 1
          }
        }

    - name: Upload Velopack release artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: PocketMC_Velopack
        path: Releases/
