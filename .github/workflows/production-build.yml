name: Production Build

on:
  push:
    branches:
      - master
      - New-Ci-Pipeline
    tags:
      - 'v*' # Triggers on tags like v1.4.0, v2.0, etc.
  pull_request:

# Required to allow the workflow to create a GitHub Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "8.0.x"
      RUNTIME: win-x64
      APP_ID: PocketMC

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add .NET tools to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Debug Build
        run: dotnet build PocketMC.Desktop.sln -c Debug

      - name: Release Build
        run: dotnet build PocketMC.Desktop.sln -c Release

      - name: Run Tests
        run: dotnet test PocketMC.Desktop.sln --no-build

      - name: Publish Multi-DLL
        run: |
          dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj `
            -c Release `
            -r $env:RUNTIME `
            --self-contained false `
            -o publish

      # Dynamically set the version based on the tag, or fallback to the run number for normal commits
      - name: Set Package Version
        id: version
        run: |
          $ref = "${{ github.ref }}"
          if ($ref.StartsWith("refs/tags/")) {
            # Strip 'refs/tags/v' or 'refs/tags/' to get a clean semantic version (e.g., 1.4.1)
            $version = $ref.Replace("refs/tags/v", "").Replace("refs/tags/", "")
          } else {
            # Dummy version for PRs and standard branch pushes to prevent Velopack from crashing
            $version = "0.0.${{ github.run_number }}"
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Download previous release
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          out-file-path: Releases
        continue-on-error: true

      # Inject the dynamic env.VERSION instead of hardcoding 1.4.0
      - name: Pack with Velopack
        run: >
          vpk pack 
          --packId ${{ env.APP_ID }} 
          --packVersion ${{ env.VERSION }} 
          --packDir publish 
          --mainExe PocketMC.Desktop.exe 
          --framework net8.0 
          --runtime ${{ env.RUNTIME }} 
          --outputDir Releases

      # Keep this if you want workflow artifacts, otherwise you can safely delete it
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PocketMC-Build-${{ env.VERSION }}
          path: Releases/

      # This step actually creates the GitHub Release and attaches the Velopack files
      # The `if` condition ensures we don't accidentally release a random commit to master
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Releases/*
          generate_release_notes: true
