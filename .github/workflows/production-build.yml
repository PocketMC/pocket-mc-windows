name: .NET Core Desktop

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-

    - name: Restore dependencies
      run: dotnet restore PocketMC.Desktop.sln

    - name: Build Configuration Debug
      run: dotnet build PocketMC.Desktop.sln --configuration Debug --no-restore

    - name: Build Configuration Release
      run: dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --configuration Release --no-build

    - name: Install Velopack CLI
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet tool install -g vpk

    - name: Add dotnet tools to PATH
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Publish WPF app
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet publish PocketMC.Desktop/PocketMC.Desktop.csproj -c Release -r win-x64 -o ./publish

    - name: Pack Velopack release
      if: startsWith(github.ref, 'refs/tags/')
      run: vpk pack -u PocketMC -v ${{ github.ref_name }} -p ./publish -e PocketMC.Desktop.exe

    - name: Find Setup.exe
      if: startsWith(github.ref, 'refs/tags/')
      id: find_setup
      shell: pwsh
      run: |
        $exe = Get-ChildItem -Path Releases -Filter *.exe -Recurse | Select-Object -First 1
        if (-not $exe) { Write-Error "No .exe found in Releases/; ensure vpk produced Setup.exe"; Exit 1 }
        echo "setup_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: PocketMC ${{ github.ref_name }}
        body: Release built by CI for ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Setup.exe to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.find_setup.outputs.setup_path }}
        asset_name: Setup-${{ github.ref_name }}.exe
        asset_content_type: application/octet-stream

    - name: Upload Velopack release artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: PocketMC_Velopack
        path: Releases/
